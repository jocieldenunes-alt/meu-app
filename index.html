<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffc800">
<title>JNTrader IA Pro</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--s1:#0a0f1e;--s2:#0f1628;--border:#1c2d45;--gold:#ffc800;--green:#00e87a;--red:#ff2d55;--text:#ccddf0;--muted:#3d5a78}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{padding:20px;background:rgba(5,8,16,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;text-align:center}
.header-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--gold)}
.content{padding:15px;flex:1;padding-bottom:80px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:15px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.profile-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;color:#fff;cursor:pointer;text-align:center;font-size:13px}
.profile-btn.active{border-color:var(--gold);background:rgba(255,200,0,0.08)}
.ctrl{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;width:100%;margin-bottom:10px;outline:none}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:40px 20px;text-align:center;cursor:pointer;margin-bottom:15px;background:rgba(28,45,69,0.2)}
.btn-analyze{width:100%;background:linear-gradient(135deg, var(--gold), #e6b000);color:#000;border:none;border-radius:14px;padding:20px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;display:none;box-shadow:0 0 20px rgba(255,200,0,0.3)}
.btn-analyze.show{display:block}
.nav{position:fixed;bottom:0;width:100%;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:15px;justify-content:space-around}
.nav-btn{background:none;border:none;color:var(--muted);font-size:12px;font-weight:bold;text-transform:uppercase}
.nav-btn.active{color:var(--gold)}
.result{display:none;margin-top:20px}
.verdict-box{padding:25px;border-radius:16px;text-align:center;margin-bottom:15px;font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px}
.call{background:rgba(0,232,122,0.15);color:var(--green);border:1px solid var(--green)}
.put{background:rgba(255,45,85,0.15);color:var(--red);border:1px solid var(--red)}
.loading{display:none;text-align:center;padding:30px;font-family:'JetBrains Mono',monospace;color:var(--gold)}
#previewImg{width:100%;border-radius:12px;margin-bottom:15px;display:none;border:1px solid var(--border)}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-name">JNTRADER IA PRO</div>
    <div style="font-size:10px;color:var(--gold);letter-spacing:2px">BINÁRIAS • AVALON • BULLEX</div>
  </div>

  <div class="content">
    <div class="profile-grid">
      <div class="profile-btn active" onclick="setProfile('Crypto IDX','M1','Avalon', this)">Crypto IDX • Avalon</div>
      <div class="profile-btn" onclick="setProfile('EUR/USD','M1','Bullex', this)">EUR/USD • Bullex</div>
    </div>

    <div class="card">
      <input class="ctrl" id="cfgAsset" placeholder="Ativo" value="Crypto IDX">
      <select class="ctrl" id="cfgBroker">
        <option>Avalon</option>
        <option>Bullex</option>
        <option>Stockity</option>
        <option>Quotex</option>
      </select>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:30px">📊</div>
      <div style="font-weight:bold; margin-top:10px">CLIQUE PARA ENVIAR PRINT</div>
      <div style="font-size:11px; color:var(--muted)">Análise de Lotes e Big Players</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
    
    <img id="previewImg">
    <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">◆ ANALISAR E ENVIAR SINAL ◆</button>

    <div class="loading" id="loading">📡 LENDO FLUXO DE ORDENS...</div>
    <div class="result" id="result"></div>
  </div>

  <nav class="nav">
    <div class="nav-btn active">🔍 Analisar</div>
    <div class="nav-btn" onclick="alert('Chave API salva no navegador')">⚙️ Config</div>
  </nav>
</div>

<script>
// INTEGRAÇÃO TELEGRAM JNTrader_IA_bot
const TELEGRAM_TOKEN = '8139536830:AAEmUvYf-u83V_m79C7Aiv9O_F36m3Y66fU'; 
const TELEGRAM_CHAT_ID = '1457106603'; 

let imgB64 = null;

function setProfile(a, t, b, el) {
  document.querySelectorAll('.profile-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('cfgAsset').value = a;
  document.getElementById('cfgBroker').value = b;
}

function handleFile(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      imgB64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImg').style.display = 'block';
      document.getElementById('btnAnalyze').classList.add('show');
    };
    reader.readAsDataURL(file);
  }
}

async function analyze() {
  const apiKey = localStorage.getItem('jn_api_key');
  if(!apiKey) { alert("Por favor, configure sua Anthropic Key nas configurações do App!"); return; }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('btnAnalyze').style.display = 'none';

  const asset = document.getElementById('cfgAsset').value;
  const broker = document.getElementById('cfgBroker').value;

  const prompt = `Você é o JNTrader IA. Analise este gráfico de Opções Binárias (${asset} na ${broker}). Foque em Price Action institucional, Lotes e Big Players. 
  Retorne APENAS um JSON: {"verdict": "CALL" ou "PUT", "confidence": 0-100, "reason": "motivo técnico curto"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json', 
        'x-api-key': apiKey, 
        'anthropic-version': '2023-06-01',
        'dangerously-allow-browser': true 
      },
      body: JSON.stringify({
        model: 'claude-3-sonnet-20240229',
        max_tokens: 500,
        messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imgB64 } }, { type: 'text', text: prompt }] }]
      })
    });

    const data = await res.json();
    const d = JSON.parse(data.content[0].text);
    
    // Resultado na Tela
    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `<div class="verdict-box ${d.verdict.toLowerCase()}">${d.verdict}</div>
                        <div class="card"><p><b>Confiança:</b> ${d.confidence}%</p><p style="margin-top:10px">${d.reason}</p></div>`;

    // Enviar para o Telegram
    const emoji = d.verdict === 'CALL' ? '🟢 COMPRA' : '🔴 VENDA';
    const msg = `🚀 <b>SINAL JNTRADER IA</b>\n\n<b>Ativo:</b> ${asset}\n<b>Corretora:</b> ${broker}\n<b>Direção:</b> ${emoji}\n<b>Confiança:</b> ${d.confidence}%\n\n<b>Análise:</b> ${d.reason}`;
    
    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
    });

  } catch(e) {
    alert("Erro na análise. Verifique se sua Anthropic Key tem saldo.");
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('btnAnalyze').style.display = 'block';
  }
}
</script>
</body>
</html>
