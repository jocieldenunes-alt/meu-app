<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ffc800">
<title>JNTrader IA Pro (Completo)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bebas+Neue&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--s1:#0a0f1e;--s2:#0f1628;--border:#1c2d45;--gold:#ffc800;--green:#00e87a;--red:#ff2d55;--text:#ccddf0;--muted:#3d5a78}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{padding:15px;background:rgba(5,8,16,0.95);border-bottom:1px solid var(--border);text-align:center}
.header-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--gold)}
.content{padding:15px;flex:1;padding-bottom:80px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:15px}
.clabel{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.ctrl{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px;color:#fff;width:100%;margin-bottom:12px;outline:none;font-size:14px;border:1px solid var(--border)}
.btn-broker{background:var(--s2);border:1px solid var(--border);padding:10px;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;width:31%;margin-bottom:5px}
.btn-broker.active{border-color:var(--gold);background:rgba(255,200,0,0.1)}
.btn-analyze{width:100%;background:linear-gradient(135deg, var(--gold), #e6b000);color:#000;border:none;border-radius:14px;padding:20px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer;box-shadow:0 0 20px rgba(255,200,0,0.3);margin-top:10px}
.nav{position:fixed;bottom:0;width:100%;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:15px;justify-content:space-around}
.nav-btn{background:none;border:none;color:var(--muted);font-size:12px;font-weight:bold;text-transform:uppercase;cursor:pointer}
.nav-btn.active{color:var(--gold)}
.loading{display:none;text-align:center;padding:20px;font-family:'JetBrains Mono',monospace;color:var(--gold)}
#previewImg{width:100%;border-radius:12px;margin-bottom:15px;display:none;border:1px solid var(--border)}
.input-file-custom { width: 100%; padding: 15px; background: var(--s2); color: var(--gold); border: 2px dashed var(--gold); border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-name">JNTRADER IA PRO</div>
    <div style="font-size:10px;color:var(--gold);letter-spacing:2px">SISTEMA DE SINAIS IA</div>
  </div>

  <div class="content">
    
    <div class="card">
      <div class="clabel">⭐ Ativo em Destaque</div>
      <button class="ctrl" style="background:rgba(255,200,0,0.1); border-color:var(--gold); font-weight:bold" onclick="document.getElementById('cfgAsset').value='Crypto IDX'">CRYPTO IDX</button>
      
      <div class="clabel" style="margin-top:10px">📊 Selecionar Ativo e Tempo</div>
      <div style="display:flex; gap:10px">
          <select class="ctrl" id="cfgAsset" style="flex:2">
            <option value="Crypto IDX">Crypto IDX</option>
            <option value="EUR/USD">EUR/USD</option>
            <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
            <option value="USD/BRL (OTC)">USD/BRL (OTC)</option>
          </select>
          <select class="ctrl" id="cfgTimeframe" style="flex:1">
            <option value="M1">M1</option>
            <option value="M5" selected>M5</option>
          </select>
      </div>

      <div class="clabel">🏢 Corretora</div>
      <div style="display:flex; flex-wrap:wrap; gap:5px" id="brokerList">
          <button class="btn-broker active" onclick="setBroker('Avalon', this)">Avalon</button>
          <button class="btn-broker" onclick="setBroker('Stockity', this)">Stockity</button>
          <button class="btn-broker" onclick="setBroker('Bullex', this)">Bullex</button>
          <button class="btn-broker" onclick="setBroker('Polarium', this)">Polarium</button>
          <button class="btn-broker" onclick="setBroker('IQ Option', this)">IQ Option</button>
          <button class="btn-broker" onclick="setBroker('Quotex', this)">Quotex</button>
      </div>
      <input type="hidden" id="selectedBroker" value="Avalon">
    </div>

    <div class="card" style="text-align:center;">
      <div class="clabel">📸 PASSO 1: ANEXAR PRINT DO GRÁFICO</div>
      <input type="file" id="fileInput" accept="image/*" class="input-file-custom" onchange="handleFile(event)">
      <p style="font-size:11px; color:var(--muted); margin-top:10px">Clique no botão acima para abrir a galeria ou câmera.</p>
    </div>

    <img id="previewImg">
    
    <div id="areaBotao" style="display:none">
        <div class="clabel">🚀 PASSO 2: GERAR ANÁLISE</div>
        <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">◆ ANALISAR E ENVIAR TELEGRAM ◆</button>
    </div>

    <div class="loading" id="loading">📡 MAPEANDO FLUXO...</div>
    <div id="result"></div>
  </div>

  <nav class="nav">
    <div class="nav-btn active">🔍 Analisar</div>
    <div class="nav-btn" onclick="goConfig()">⚙️ Config</div>
  </nav>
</div>

<script>
const TELEGRAM_TOKEN = '8139536830:AAEmUvYf-u83V_m79C7Aiv9O_F36m3Y66fU'; 
const TELEGRAM_CHAT_ID = '1457106603'; 
let imgB64 = null;

function setBroker(name, btn) {
    document.getElementById('selectedBroker').value = name;
    document.querySelectorAll('.btn-broker').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function handleFile(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      imgB64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewImg').style.display = 'block';
      document.getElementById('areaBotao').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
}

function goConfig() {
    let key = prompt("Insira sua Gemini Key (AIza...):", localStorage.getItem('jn_gemini_key') || "");
    if(key) { localStorage.setItem('jn_gemini_key', key); alert("Chave Salva com Sucesso!"); }
}

async function analyze() {
  const apiKey = localStorage.getItem('jn_gemini_key');
  if(!apiKey) { alert("Configure sua chave AIza no botão Config!"); return; }
  
  document.getElementById('loading').style.display = 'block';
  document.getElementById('areaBotao').style.display = 'none';

  const asset = document.getElementById('cfgAsset').value;
  const timeframe = document.getElementById('cfgTimeframe').value;
  const broker = document.getElementById('selectedBroker').value;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

  const payload = {
    contents: [{
      parts: [
        {text: `Você é o JNTrader IA. Analise este gráfico (${asset}, ${timeframe}, Corretora ${broker}). Identifique Lotes e Big Players. Responda apenas em JSON: {"verdict": "CALL" ou "PUT", "confidence": 0-100, "reason": "motivo técnico curto"}`},
        {inline_data: {mime_type: "image/jpeg", data: imgB64}}
      ]
    }]
  };

  try {
    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
    const data = await res.json();
    let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
    const d = JSON.parse(text);
    
    const msg = `🚀 <b>SINAL JNTRADER IA</b>\n\n<b>Corretora:</b> ${broker}\n<b>Ativo:</b> ${asset}\n<b>Tempo:</b> ${timeframe}\n<b>Direção:</b> ${d.verdict === 'CALL' ? '🟢 COMPRA' : '🔴 VENDA'}\n<b>Confiança:</b> ${d.confidence}%\n\n<b>Análise:</b> ${d.reason}`;
    
    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: msg, parse_mode: 'HTML' })
    });
    alert("Sinal enviado ao Telegram!");

  } catch(e) { alert("Erro na análise. Verifique sua chave no botão Config."); }
  finally { 
    document.getElementById('loading').style.display = 'none'; 
    document.getElementById('areaBotao').style.display = 'block';
  }
}
</script>
</body>
</html>
