<div class="card" style="text-align:center; padding:20px;">
  <div class="clabel">📸 PASSO 1: ENVIAR PRINT</div>
  
  <input type="file" id="fileInput" accept="image/*" 
         style="display: block; width: 100%; padding: 15px; background: var(--s2); color: var(--gold); border: 1px solid var(--gold); border-radius: 10px; margin-bottom: 15px;" 
         onchange="handleFile(event)">
  
  <div style="font-size:11px; color:var(--muted)">Tire o print na corretora e anexe aqui.</div>
</div>

<img id="previewImg" style="width:100%; border-radius:12px; margin-bottom:15px; display:none; border:1px solid var(--border)">

<div class="clabel">🚀 PASSO 2: GERAR SINAL</div>
<button class="btn-analyze" id="btnAnalyze" onclick="analyze()" style="display:block; width:100%">◆ ANALISAR E ENVIAR TELEGRAM ◆</button>
